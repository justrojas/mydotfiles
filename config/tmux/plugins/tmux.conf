# Shift Alt vim keys to switch between windows
bind -n M-H previous-window
bind -n M-L next-window

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Basic settings
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g allow-passthrough on
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g default-shell /bin/zsh
set -gq allow-passthrough on

# Terminal settings
set-option -a terminal-features 'xterm-256color:RGB'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tmux-yank'

# Set active pane border color to match kitty theme blue (#4c99d3)
set -g pane-active-border-style "fg=#4c99d3"
set -g pane-border-style "fg=#585a58"

# Clipboard settings (FIXED)
set-option -g set-clipboard on
set -g @continuum-restore 'on'
set-window-option -g mode-keys vi

# Fixed copy-mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# Toggle status bar
bind-key b set-option status

# Alt+number window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Window and pane management
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind-key x kill-pane
bind-key X kill-window
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Pane manipulation
bind-key j swap-pane -D
bind-key k swap-pane -U
bind-key H swap-window -t -1
bind-key L swap-window -t +1

# Window swapping with Alt+number
bind-key M-1 swap-window -t 1
bind-key M-2 swap-window -t 2
bind-key M-3 swap-window -t 3
bind-key M-4 swap-window -t 4
bind-key M-5 swap-window -t 5
bind-key M-6 swap-window -t 6
bind-key M-7 swap-window -t 7
bind-key M-8 swap-window -t 8
bind-key M-9 swap-window -t 9

bind u command-prompt -p "join-pane to window:" "join-pane -h -t %%"

# Pane labeling and titles
set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_current_command}"
set -g automatic-rename on
set -g set-titles on
set -g set-titles-string "#{session_name} - #{window_name}"

# Session management
bind-key s choose-session
bind-key S command-prompt -p "New session name:" "new-session -d -s '%%'"
bind-key K confirm-before -p "kill-session #S? (y/n)" kill-session

# Display improvements
set -g display-panes-time 2000
set -g display-panes-colour white
set -g display-panes-active-colour blue

# Initialize TPM
run '~/Documents/my-dotfiles/.config/tmux/plugins/tpm/tpm'
